<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚠️ CLASSIFIED TERMINAL ⚠️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

    :root {
      --red: #ff0000;
      --dark-red: #8b0000;
      --glow-red: rgba(255, 0, 0, 0.6);
      --bg: #0a0a0a;
      --panel: #111;
      --scanline: rgba(255,255,255,0.02);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        var(--scanline) 0px,
        var(--scanline) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .terminal-header {
      font-family: 'Share Tech Mono', monospace;
      color: #333;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
      animation: flicker 4s infinite;
    }

    .panel {
      background: var(--panel);
      border: 2px solid #1a1a1a;
      border-radius: 12px;
      padding: 50px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      position: relative;
      box-shadow:
        0 0 0 1px #222,
        0 0 40px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .panel::before {
      content: 'CLASSIFIED // LEVEL Ω // AUTHORIZED USE ONLY';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      padding: 0 12px;
      font-size: 9px;
      letter-spacing: 2px;
      color: #2a2a2a;
      white-space: nowrap;
    }

    /* The Big Button */
    .btn-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
    }

    /* Pulsing halo rings */
    .halo {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 2px solid var(--red);
      animation: halo-pulse 1.4s ease-out infinite;
      opacity: 0;
    }
    .halo:nth-child(2) { animation-delay: 0.46s; }
    .halo:nth-child(3) { animation-delay: 0.92s; }

    @keyframes halo-pulse {
      0%   { transform: scale(0.85); opacity: 0.7; }
      100% { transform: scale(1.3);  opacity: 0; }
    }

    .big-button {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      outline: none;
      background: radial-gradient(circle at 35% 35%, #ff4444, #cc0000 50%, #6b0000);
      box-shadow:
        0 0 0 6px #1a0000,
        0 0 0 8px #400000,
        0 0 60px var(--glow-red),
        0 0 120px rgba(255,0,0,0.3),
        inset 0 6px 20px rgba(255,150,150,0.2),
        inset 0 -6px 20px rgba(0,0,0,0.5);
      animation: flash 0.8s ease-in-out infinite alternate;
      transition: transform 0.1s, box-shadow 0.1s;
      z-index: 1;
    }

    .big-button:active {
      transform: scale(0.95) translateY(4px);
      box-shadow:
        0 0 0 6px #1a0000,
        0 0 0 8px #400000,
        0 0 30px var(--glow-red),
        inset 0 6px 20px rgba(0,0,0,0.6);
    }

    @keyframes flash {
      0%   { box-shadow: 0 0 0 6px #1a0000, 0 0 0 8px #400000, 0 0 40px var(--glow-red), 0 0 80px rgba(255,0,0,0.2), inset 0 6px 20px rgba(255,150,150,0.2), inset 0 -6px 20px rgba(0,0,0,0.5); filter: brightness(0.85); }
      100% { box-shadow: 0 0 0 6px #1a0000, 0 0 0 8px #550000, 0 0 80px var(--glow-red), 0 0 160px rgba(255,0,0,0.5), 0 0 240px rgba(255,0,0,0.2), inset 0 6px 20px rgba(255,200,200,0.3), inset 0 -6px 20px rgba(0,0,0,0.4); filter: brightness(1.15); }
    }

    .button-icons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    .nuclear-sign {
      font-size: 72px;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
      animation: spin-slow 8s linear infinite;
    }

    .skull {
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.8));
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Label */
    .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 6px;
      color: var(--red);
      text-transform: uppercase;
      text-shadow:
        0 0 10px var(--glow-red),
        0 0 30px rgba(255,0,0,0.4);
      animation: text-flicker 0.8s ease-in-out infinite alternate;
      text-align: center;
    }

    @keyframes text-flicker {
      0%   { opacity: 0.8; text-shadow: 0 0 6px var(--glow-red); }
      100% { opacity: 1.0; text-shadow: 0 0 20px var(--glow-red), 0 0 50px rgba(255,0,0,0.5); }
    }

    .warning-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 4px;
      color: #2a2a2a;
      margin-top: -12px;
    }

    /* Click aftermath */
    .aftermath {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,0,0,0.15);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: red-flash 0.3s ease;
    }

    .aftermath.visible {
      display: flex;
    }

    @keyframes red-flash {
      0%   { background: rgba(255,0,0,0.7); }
      100% { background: rgba(255,0,0,0.15); }
    }

    .aftermath-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      color: #fff;
      letter-spacing: 10px;
      text-shadow: 0 0 30px var(--red), 0 0 80px var(--red);
      animation: glitch 0.5s infinite;
    }

    @keyframes glitch {
      0%   { transform: translate(0); }
      20%  { transform: translate(-3px, 2px); }
      40%  { transform: translate(3px, -2px); }
      60%  { transform: translate(-2px, 3px); }
      80%  { transform: translate(2px, -1px); }
      100% { transform: translate(0); }
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      97% { opacity: 1; }
      98% { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div class="terminal-header">TERMINAL SESSION 0x4F5256 // ACTIVE</div>

  <div class="panel">
    <div class="btn-wrapper">
      <div class="halo"></div>
      <div class="halo"></div>
      <div class="halo"></div>
      <button class="big-button" onclick="detonate()" aria-label="Initiate sequence">
        <div class="button-icons">
          <span class="nuclear-sign">☢️</span>
          <span class="skull">💀</span>
        </div>
      </button>
    </div>

    <div class="label">Press to eliminate Örvar and delay his flight</div>
    <div class="warning-strip">⚠ &nbsp; IRREVERSIBLE SEQUENCE &nbsp; ⚠</div>
  </div>

  <div class="aftermath" id="aftermath">
    <div class="aftermath-text">☢️ ÖRVAR HAS BEEN ELIMINATED ☢️</div>
  </div>

  <script>
    function detonate() {
      const el = document.getElementById('aftermath');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2000);
    }
  </script>
</body>
</html>
